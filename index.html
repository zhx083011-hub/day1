<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Target Shooting Range</title>
  <style>
    :root{--bg:#070a12;--panel:#0d1322;--panel2:#10192d;--line:rgba(255,255,255,.08);--txt:#eaf2ff;--muted:#94a3b8;--cyan:#18e2ff;--red:#ff4d6d;--green:#31ff8b;--shadow:0 18px 60px rgba(0,0,0,.45)}
    *{box-sizing:border-box} html,body{height:100%} body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:radial-gradient(circle at top,#10192d 0%,#070a12 45%,#04050a 100%);color:var(--txt);display:grid;place-items:center;padding:18px;overflow:hidden}
    .app{width:min(1100px,100%);display:grid;gap:14px}
    .topbar,.hud,.game,.footer{background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02));border:1px solid var(--line);box-shadow:var(--shadow);backdrop-filter:blur(16px);border-radius:18px}
    .topbar{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
    .brand{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:.18em;text-transform:uppercase}
    .dot{width:10px;height:10px;border-radius:50%;background:var(--green);box-shadow:0 0 16px var(--green)}
    .sub{color:var(--muted);font-size:13px}
    .hud{padding:14px 16px;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
    .stat{background:linear-gradient(180deg,rgba(16,25,45,.92),rgba(10,14,24,.92));border:1px solid var(--line);border-radius:14px;padding:12px 14px}
    .label{color:var(--muted);font-size:11px;letter-spacing:.16em;text-transform:uppercase;margin-bottom:6px}
    .value{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:28px;font-weight:800;line-height:1}
    .value.good{color:var(--green)} .value.cyan{color:var(--cyan)} .value.red{color:var(--red)}
    .game{position:relative;min-height:560px;display:grid;place-items:center;overflow:hidden;background:radial-gradient(circle at center,rgba(24,226,255,.09),transparent 40%),linear-gradient(135deg,rgba(9,13,24,.98),rgba(8,10,18,.98))}
    .range-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:70px 70px;opacity:.35;pointer-events:none}
    .range-grid::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at center,transparent 0 35%,rgba(0,0,0,.22) 70%,rgba(0,0,0,.48) 100%)}
    .arena{position:relative;width:min(100%,980px);height:min(72vh,560px);border-radius:22px;border:1px solid rgba(255,255,255,.1);overflow:hidden;background:linear-gradient(180deg,rgba(8,12,22,.92),rgba(4,6,12,.95));box-shadow:inset 0 0 0 1px rgba(24,226,255,.08),0 30px 90px rgba(0,0,0,.42)}
    .arena::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 50%,rgba(255,255,255,.06),transparent 38%),radial-gradient(circle at 20% 20%,rgba(24,226,255,.15),transparent 15%),radial-gradient(circle at 80% 30%,rgba(255,77,109,.15),transparent 16%)}
    .crosshair{position:absolute;left:50%;top:50%;width:34px;height:34px;transform:translate(-50%,-50%);pointer-events:none;opacity:.9;filter:drop-shadow(0 0 10px rgba(24,226,255,.45))}
    .crosshair:before,.crosshair:after{content:"";position:absolute;left:50%;top:50%;background:rgba(255,255,255,.9);transform:translate(-50%,-50%)}
    .crosshair:before{width:34px;height:2px}.crosshair:after{width:2px;height:34px}
    .crosshair i{position:absolute;border:2px solid var(--cyan);border-radius:50%;inset:8px;opacity:.85}
    .target{position:absolute;width:72px;height:72px;border-radius:50%;transform:translate(-50%,-50%);cursor:pointer;display:grid;place-items:center;transition:transform .08s linear;animation:spawn .16s ease-out}
    @keyframes spawn{from{transform:translate(-50%,-50%) scale(.45);opacity:.2}to{transform:translate(-50%,-50%) scale(1);opacity:1}}
    .target::before,.target::after{content:"";position:absolute;border-radius:50%}
    .target::before{inset:0;background:radial-gradient(circle at 35% 30%,#fff,rgba(255,255,255,.2) 12%,rgba(24,226,255,.9) 24%,rgba(24,226,255,.5) 40%,rgba(255,77,109,.85) 41%,rgba(255,77,109,.85) 58%,rgba(255,255,255,.95) 59%,rgba(255,255,255,.95) 72%,rgba(255,77,109,.9) 73%);box-shadow:0 0 24px rgba(24,226,255,.35),0 0 42px rgba(255,77,109,.2)}
    .target::after{inset:26px;background:#fff;box-shadow:0 0 18px rgba(255,255,255,.8)}
    .target.hit{animation:hit .18s ease-out forwards}
    @keyframes hit{to{transform:translate(-50%,-50%) scale(1.35);opacity:0;filter:blur(2px)}}
    .floating{position:absolute;inset:auto auto 18px 18px;background:rgba(7,10,18,.7);border:1px solid var(--line);border-radius:14px;padding:10px 12px;color:var(--muted);font-size:13px;letter-spacing:.06em}
    .floating b{color:var(--txt)}
    .center-msg{position:absolute;inset:50% auto auto 50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;text-shadow:0 4px 24px rgba(0,0,0,.6)}
    .center-msg .big{font-family:ui-monospace,monospace;font-size:38px;font-weight:900;letter-spacing:.16em}
    .center-msg .small{margin-top:8px;color:var(--muted);font-size:14px;letter-spacing:.18em;text-transform:uppercase}
    .footer{padding:14px 16px;display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}
    .btns{display:flex;gap:10px;flex-wrap:wrap}
    button{border:0;border-radius:999px;padding:12px 18px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;transition:transform .15s ease,box-shadow .15s ease,opacity .15s ease}
    .primary{background:linear-gradient(135deg,var(--cyan),#1af6c6);color:#021018;box-shadow:0 0 24px rgba(24,226,255,.32)}
    .ghost{background:rgba(255,255,255,.06);color:var(--txt);border:1px solid var(--line)}
    button:hover{transform:translateY(-1px)}
    .note{color:var(--muted);font-size:13px}
    @media (max-width:720px){.hud{grid-template-columns:repeat(2,minmax(0,1fr))}.arena{height:62vh}.center-msg .big{font-size:30px}}
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand"><span class="dot"></span> TARGET SHOOTING RANGE</div>
      <div class="sub">Aim • Click • Score • Reload</div>
    </div>

    <div class="hud">
      <div class="stat"><div class="label">Score</div><div class="value cyan" id="score">0</div></div>
      <div class="stat"><div class="label">Time</div><div class="value good" id="time">30</div></div>
      <div class="stat"><div class="label">Hits</div><div class="value" id="hits">0</div></div>
      <div class="stat"><div class="label">Accuracy</div><div class="value red" id="accuracy">100%</div></div>
    </div>

    <div class="game">
      <div class="range-grid"></div>
      <div class="arena" id="arena">
        <div class="crosshair"><i></i></div>
        <div class="center-msg" id="centerMsg">
          <div class="big">READY</div>
          <div class="small">click a target to start</div>
        </div>
        <div class="floating"><b>Tip:</b> Hit the moving targets fast. Faster hits = higher score.</div>
      </div>
    </div>

    <div class="footer">
      <div class="btns">
        <button class="primary" id="startBtn">Start Session</button>
        <button class="ghost" id="resetBtn">Reset</button>
      </div>
      <div class="note" id="status">30 seconds • 1 target at a time • no JavaScript frameworks</div>
    </div>
  </div>

  <script>
    const arena = document.getElementById('arena');
    const scoreEl = document.getElementById('score');
    const timeEl = document.getElementById('time');
    const hitsEl = document.getElementById('hits');
    const accEl = document.getElementById('accuracy');
    const statusEl = document.getElementById('status');
    const centerMsg = document.getElementById('centerMsg');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');

    let score = 0, hits = 0, misses = 0, time = 30, running = false, timer = null, target = null, moveTimer = null;

    function updateHUD(){
      scoreEl.textContent = score;
      hitsEl.textContent = hits;
      timeEl.textContent = time;
      const shots = hits + misses;
      accEl.textContent = shots ? Math.round((hits / shots) * 100) + '%' : '100%';
    }

    function clearTarget(){
      if (target && target.parentNode) target.parentNode.removeChild(target);
      target = null;
      clearInterval(moveTimer);
      moveTimer = null;
    }

    function spawnTarget(){
      clearTarget();
      const rect = arena.getBoundingClientRect();
      const size = Math.max(54, Math.min(86, rect.width * 0.075));
      const margin = size / 2 + 18;
      target = document.createElement('div');
      target.className = 'target';
      target.style.width = size + 'px';
      target.style.height = size + 'px';
      let x = margin + Math.random() * (rect.width - margin * 2);
      let y = margin + Math.random() * (rect.height - margin * 2);
      let vx = (Math.random() * 2.4 + 1.8) * (Math.random() < .5 ? -1 : 1);
      let vy = (Math.random() * 2.1 + 1.4) * (Math.random() < .5 ? -1 : 1);
      const half = size / 2;
      target.style.left = x + 'px';
      target.style.top = y + 'px';
      target.addEventListener('click', e => {
        e.stopPropagation();
        if (!running) return;
        hits++;
        score += 100;
        target.classList.add('hit');
        updateHUD();
        setTimeout(() => { if (running) spawnTarget(); }, 120);
      });
      arena.appendChild(target);
      moveTimer = setInterval(() => {
        if (!running || !target) return;
        x += vx; y += vy;
        if (x < half || x > rect.width - half) vx *= -1;
        if (y < half || y > rect.height - half) vy *= -1;
        x = Math.max(half, Math.min(rect.width - half, x));
        y = Math.max(half, Math.min(rect.height - half, y));
        target.style.left = x + 'px';
        target.style.top = y + 'px';
      }, 16);
    }

    function endGame(){
      running = false;
      clearInterval(timer); timer = null;
      clearTarget();
      centerMsg.innerHTML = `<div class="big">TIME UP</div><div class="small">final score: ${score}</div>`;
      statusEl.textContent = 'Session complete • Press Reset or Start Session to play again';
      startBtn.textContent = 'Play Again';
    }

    function startGame(){
      if (running) return;
      if (time <= 0) resetGame();
      running = true;
      centerMsg.innerHTML = '<div class="big">FIRE!</div><div class="small">take your first shot</div>';
      statusEl.textContent = 'Game live • targets move every frame';
      startBtn.textContent = 'Running...';
      spawnTarget();
      timer = setInterval(() => {
        time--;
        updateHUD();
        if (time <= 0) endGame();
      }, 1000);
      setTimeout(() => {
        if (running) centerMsg.innerHTML = '<div class="big">AIM</div><div class="small">keep the streak alive</div>';
      }, 1200);
    }

    function resetGame(){
      running = false;
      clearInterval(timer); timer = null;
      clearTarget();
      score = 0; hits = 0; misses = 0; time = 30;
      updateHUD();
      centerMsg.innerHTML = '<div class="big">READY</div><div class="small">click a target to start</div>';
      statusEl.textContent = '30 seconds • 1 target at a time • no JavaScript frameworks';
      startBtn.textContent = 'Start Session';
    }

    arena.addEventListener('click', () => {
      if (!running) return;
      misses++;
      score = Math.max(0, score - 10);
      updateHUD();
    });

    startBtn.addEventListener('click', startGame);
    resetBtn.addEventListener('click', resetGame);
    updateHUD();
  </script>
</body>
</html>
